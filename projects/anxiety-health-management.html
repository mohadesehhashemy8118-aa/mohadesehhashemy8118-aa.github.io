<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f7f7fa;
    --bg3: #f0f0f8;
    --text: #1a1a1e;
    --text2: #5a5a6a;
    --text3: #9898a8;
    --border: #e8e8ef;
    --border2: #d0d0dc;
    --accent: #4a6fa5;
    --accent-light: #e8f0fa;
    --accent-text: #2a4f85;
    --teal: #2a9d8f;
    --teal-light: #e0f5f3;
    --teal-text: #1a6d62;
    --radius: 12px;

    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-fa: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141418;
      --bg2: #1e1e24;
      --bg3: #222230;
      --text: #f0f0f5;
      --text2: #a0a0b0;
      --text3: #606070;
      --border: #2a2a34;
      --border2: #38384a;
      --accent-light: #1a2a3f;
      --accent-text: #8ab0e0;
      --teal-light: #0d2e2b;
      --teal-text: #7ed4cc;
    }
  }

  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    font-family: var(--font-fa);
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    direction: rtl;
  }

  body.ltr {
    font-family: var(--font);
    direction: ltr;
    text-align: left;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 0 1.5rem 5rem;
  }

  /* ── Nav ── */
  .nav {
    padding: 1.25rem 0;
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-back {
    font-size: 13px;
    color: var(--text2);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color .18s;
  }
  .nav-back:hover { color: var(--text); }
  .ltr .nav-back { flex-direction: row-reverse; }

  .lang-toggle { display: flex; gap: 8px; }
  .lang-btn {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    cursor: pointer;
    font-size: 12px;
    color: var(--text2);
    font-family: inherit;
    transition: all .18s;
  }
  .lang-btn.active {
    background: var(--bg2);
    color: var(--text);
    font-weight: 500;
  }

  /* ── Hero ── */
  .hero {
    margin-bottom: 3rem;
  }
  .hero-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }
  .ltr .hero-tags { flex-direction: row; }
  .tag {
    font-size: 12px;
    padding: 3px 12px;
    border-radius: 20px;
    font-weight: 500;
  }
  .tag-blue  { background: var(--accent-light); color: var(--accent-text); }
  .tag-teal  { background: var(--teal-light);   color: var(--teal-text);   }

  .hero-title {
    font-size: 32px;
    font-weight: 600;
    line-height: 1.25;
    margin-bottom: .75rem;
  }
  .hero-subtitle {
    font-size: 16px;
    color: var(--text2);
    max-width: 600px;
    line-height: 1.75;
    margin-bottom: 2rem;
  }

  /* ── Meta row ── */
  .meta-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 3rem;
  }
  .meta-item {
    background: var(--bg2);
    padding: .9rem 1.25rem;
  }
  .meta-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text3);
    margin-bottom: .3rem;
  }
  .meta-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  /* ── Cover image placeholder ── */

    align-items: center;
    justify-content: center;
    margin-bottom: 3rem;
    position: relative;
    overflow: hidden;
  }

    font-size: 80px;
    opacity: .6;
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }
  .cover-label {
    position: absolute;
    bottom: 1.25rem;
    font-size: 12px;
    color: rgba(255,255,255,.45);
  }
  .ltr .cover-label { right: 1.25rem; }
  body:not(.ltr) .cover-label { left: 1.25rem; }

  /* ── Sections ── */
  .divider { height: 1px; background: var(--border); margin: 2.5rem 0; }

  .section { margin-bottom: 3rem; }

  .section-num {
    font-size: 11px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: .5rem;

  .section-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 1rem;
    line-height: 1.3;
  }
  .section-body {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.8;
  }
  .section-body p { margin-bottom: 1rem; }
  .section-body p:last-child { margin-bottom: 0; }

  /* ── Callout ── */
  .callout {
    background: var(--teal-light);
    border-right: 3px solid var(--teal);
    border-radius: var(--radius-sm);
    padding: 1rem 1.25rem;
    margin: 1.5rem 0;
    font-size: 15px;
    color: var(--teal-text);
    line-height: 1.7;
  }
  .ltr .callout { border-right: none; border-left: 3px solid var(--teal); }

  /* ── Feature list ── */
  .features {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 1.5rem 0;
  }
  .feature-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 1rem 1.25rem;
  }
  .feature-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: .3rem;
  }
  .feature-desc {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.65;

    background: var(--bg3);
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    height: 260px;

    color: var(--text3);

    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 1.5rem 0;

    margin-top: 4rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;

    display: flex;

    border-radius: var(--radius-sm);

    .hero-title { font-size: 24px; }
    .img-row { grid-template-columns: 1fr; }
    .meta-row { grid-template-columns: 1fr 1fr; }

</style>

function renderSection(s, d) {
  let html = `
    <div class="section">
      <div class="section-num">${s.num}</div>
      <div class="section-title">${s.title}</div>
      <div class="section-body">${s.body}</div>`;

  if (s.callout) html += `<div class="callout">${s.callout}</div>`;
  if (s.after)   html += `<div class="section-body">${s.after}</div>`;

  if (s.features) {
    html += `<div class="features">` + s.features.map(f => `
      <div class="feature-item">
        <div class="feature-title">${f.title}</div>
        <div class="feature-desc">${f.desc}</div>
      </div>`).join('') + `</div>`;
  }

  if (s.img.rows) {
    html += `<div class="img-row">
      <div class="img-placeholder"><div class="icon">🖼</div><div>${d.imgPlaceholder}</div><div style="font-size:11px;margin-top:2px;opacity:.7">${d.imgHint}</div></div>
      <div class="img-placeholder"><div class="icon">🖼</div><div>${d.imgPlaceholder}</div><div style="font-size:11px;margin-top:2px;opacity:.7">${d.imgHint}</div></div>
    </div>`;
  } else {
    html += `<div class="img-placeholder"><div class="icon">🖼</div><div>${s.img.label}</div><div style="font-size:11px;margin-top:2px;opacity:.7">${d.imgHint}</div></div>`;
  }

  html += `</div><div class="divider"></div>`;
  return html;
}

function setLang(lang) {
  const d = c[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = d.dir;
  document.body.className = d.cls;
  document.querySelector('#navBack').textContent = d.navBack;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (lang === 'fa' ? 'فارسی' : 'English'));
  });

  const tagHtml = d.tags.map(t => `<span class="tag ${t.cls}">${t.text}</span>`).join('');
  const metaHtml = d.meta.map(m => `<div class="meta-item"><div class="meta-label">${m.label}</div><div class="meta-value">${m.value}</div></div>`).join('');
  const sectionsHtml = d.sections.map(s => renderSection(s, d)).join('');

  document.getElementById('content').innerHTML = `
    <div class="hero">
