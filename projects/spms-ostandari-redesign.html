<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff; --bg2: #f5f7fb; --bg3: #eef1f8;
    --text: #1a1a1e; --text2: #5a5a6a; --text3: #9898a8;
    --border: #e4e8f0; --border2: #cdd4e2;
    --blue: #3b7dd8; --blue-light: #e8f0fc; --blue-text: #2056a0;
    --navy: #1e3a6e; --navy-light: #e8ecf5; --navy-text: #1e3a6e;

    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-fa: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;

    :root {
      --bg: #14161c; --bg2: #1c1f28; --bg3: #20242e;
      --text: #f0f1f5; --text2: #a8acb8; --text3: #686c78;
      --border: #2a2e3a; --border2: #383c4a;
      --blue-light: #182840; --blue-text: #8ab4e8;
      --navy-light: #182030; --navy-text: #a0b8e0;
    }
  }

  html { font-size: 16px; scroll-behavior: smooth; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.7; direction: ltr; }
  body.rtl { font-family: var(--font-fa); direction: rtl; text-align: right; }
  .container { max-width: 760px; margin: 0 auto; padding: 0 1.5rem 5rem; }

  .nav { padding: 1.25rem 0; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .nav-back { font-size: 13px; color: var(--text2); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color .18s; }
  .nav-back:hover { color: var(--text); }
  .rtl .nav-back { flex-direction: row-reverse; }
  .lang-toggle { display: flex; gap: 8px; }
  .lang-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; cursor: pointer; font-size: 12px; color: var(--text2); font-family: inherit; transition: all .18s; }
  .lang-btn.active { background: var(--bg2); color: var(--text); font-weight: 500; }

  .hero { margin-bottom: 2.5rem; }
  .hero-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .tag { font-size: 12px; padding: 3px 12px; border-radius: 20px; font-weight: 500; }
  .tag-blue { background: var(--blue-light); color: var(--blue-text); }
  .tag-navy { background: var(--navy-light); color: var(--navy-text); }
  .hero-title { font-size: 32px; font-weight: 600; line-height: 1.25; margin-bottom: .75rem; }
  .hero-subtitle { font-size: 16px; color: var(--text2); max-width: 600px; line-height: 1.75; }

  .meta-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin: 2rem 0 3rem; }
  .meta-item { background: var(--bg2); padding: .9rem 1.25rem; }
  .meta-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: .3rem; }
  .meta-value { font-size: 14px; font-weight: 500; color: var(--text); }

  .nda-notice { background: var(--bg3); border: 1px dashed var(--border2); border-radius: var(--radius-sm); padding: .9rem 1.25rem; margin-bottom: 3rem; font-size: 13px; color: var(--text3); display: flex; align-items: center; gap: 8px; }

  .cover { border-radius: var(--radius); overflow: hidden; margin-bottom: 3rem; background: var(--navy); }
  .cover img { width: 100%; max-height: 440px; object-fit: cover; object-position: top; display: block; }

  .divider { height: 1px; background: var(--border); margin: 2.5rem 0; }
  .section { margin-bottom: 3rem; }
  .section-num { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: .5rem; }
  .section-title { font-size: 22px; font-weight: 600; margin-bottom: 1rem; line-height: 1.3; }
  .section-body { font-size: 15px; color: var(--text2); line-height: 1.8; }
  .section-body p { margin-bottom: 1rem; }
  .section-body p:last-child { margin-bottom: 0; }

  .callout { background: var(--blue-light); border-left: 3px solid var(--blue); border-radius: var(--radius-sm); padding: 1rem 1.25rem; margin: 1.5rem 0; font-size: 15px; color: var(--blue-text); line-height: 1.7; }
  .rtl .callout { border-left: none; border-right: 3px solid var(--blue); }

  .features { display: flex; flex-direction: column; gap: 12px; margin: 1.5rem 0; }
  .feature-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem 1.25rem; }
  .feature-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: .3rem; }
  .feature-desc { font-size: 14px; color: var(--text2); line-height: 1.65; }

  /* Design system swatches */
  .ds-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; margin: 1.5rem 0; }
  .ds-swatch { border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
  .ds-fill { height: 44px; }
  .ds-label { font-size: 11px; text-align: center; padding: .35rem 0; background: var(--bg2); color: var(--text2); }

  .module-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 1.5rem 0; }
  .module-card { background: var(--blue-light); border-radius: var(--radius-sm); padding: .9rem 1rem; text-align: center; }
  .module-icon { font-size: 22px; margin-bottom: .4rem; }
  .module-name { font-size: 13px; font-weight: 600; color: var(--blue-text); }

  .screen-wrap { display: flex; justify-content: center; gap: 16px; margin: 2rem 0; flex-wrap: wrap; }
  .screen-full { width: 100%; border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,.10); display: block; border: 1px solid var(--border); }
  .screen-half { width: 48%; min-width: 240px; border-radius: var(--radius-sm); box-shadow: 0 6px 24px rgba(0,0,0,.10); display: block; border: 1px solid var(--border); }
  .screen-mobile { width: 220px; border-radius: 18px; box-shadow: 0 8px 28px rgba(0,0,0,.12); display: block; }

  .reflection { background: var(--bg3); border-radius: var(--radius); padding: 1.5rem; margin: 1.5rem 0; border: 1px solid var(--border2); }

  .nav-bottom { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
  .nav-bottom a { font-size: 14px; color: var(--text2); text-decoration: none; display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--border2); border-radius: var(--radius-sm); transition: all .18s; }
  .nav-bottom a:hover { background: var(--bg2); color: var(--text); }

  @media (max-width: 480px) {
    .hero-title { font-size: 24px; }
    .screen-half { width: 100%; }
  }
</style>
</head>

function renderSection(s) {
  let html = `<div class="section">
    <div class="section-num">${s.num}</div>
    <div class="section-title">${s.title}</div>`;

  if (!s.reflection) html += `<div class="section-body">${s.body}</div>`;

  if (s.moduleTitle) {
    html += `<div class="feature-title" style="margin-top:1.25rem">${s.moduleTitle}</div>
      <div class="module-grid">` + s.modules.map(m =>
        `<div class="module-card"><div class="module-icon">${m.icon}</div><div class="module-name">${m.name}</div></div>`
      ).join('') + `</div>`;
  }

  if (s.callout) html += `<div class="callout">${s.callout}</div>`;

  if (s.features) {
    html += `<div class="features">` + s.features.map(f =>
      `<div class="feature-item">
        <div class="feature-title">${f.title}</div>
        <div class="feature-desc">${f.desc}</div>
      </div>`).join('') + `</div>`;
  }

  if (s.reflection) {
    html += `<div class="reflection"><div class="section-body">${s.body}</div></div>`;
  }

  if (s.lessons) {
    html += `<div class="features">` + s.lessons.map(f =>
      `<div class="feature-item">
        <div class="feature-title">← ${f.title}</div>
        <div class="feature-desc">${f.desc}</div>
      </div>`).join('') + `</div>`;
  }

  if (s.imgs && s.imgs.length) {
    if (s.imgType === 'mobile') {
      html += `<div class="screen-wrap">` +
        s.imgs.map(img => `<img class="screen-mobile" src="${IMG}${img}" alt="${s.title}" loading="lazy">`).join('') +
        `</div>`;
    } else {
      html += s.imgs.map(img => `<img class="screen-full" src="${IMG}${img}" alt="${s.title}" loading="lazy" style="margin-top:1.5rem">`).join('');
    }
  }

  html += `</div><div class="divider"></div>`;
  return html;
}

function setLang(lang) {
  const d = c[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = d.dir;
  document.body.className = d.cls;
  document.querySelector('#navBack').textContent = d.navBack;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (lang==='fa'?'فارسی':'English'));
  });

  const tagHtml = d.tags.map(t=>`<span class="tag ${t.cls}">${t.text}</span>`).join('');
  const metaHtml = d.meta.map(m=>`<div class="meta-item"><div class="meta-label">${m.label}</div><div class="meta-value">${m.value}</div></div>`).join('');
  const sectionsHtml = d.sections.map(renderSection).join('');

  document.getElementById('content').innerHTML = `
    <div class="hero">
      <div class="hero-tags">${tagHtml}</div>
      <div class="hero-title">${d.title}</div>
      <div class="hero-subtitle">${d.subtitle}</div>
    </div>
    <div class="meta-row">${metaHtml}</div>
    <div class="nda-notice">🔒 ${d.ndaText}</div>
    <div class="cover"><img src="${IMG}01-login.png" alt="SPMS login"></div>
    <div class="divider"></div>
    ${sectionsHtml}
    <div class="nav-bottom">
      <a href="../index.html">${d.navBack2}</a>
      <a href="#">${d.navNext}</a>
    </div>`;
}

setLang('en');
