<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مراقب — کیس استادی | Mohadeseh Hashemi</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff; --bg2: #f7f7fa; --bg3: #f5f0f5;
    --text: #1a1a1e; --text2: #5a5a6a; --text3: #9898a8;
    --border: #e8e8ef; --border2: #d0d0dc;
    --accent: #9b7fa6; --accent-light: #f2ecf7; --accent-text: #5e3d72;
    --rose: #c97a8a; --rose-light: #fceef1; --rose-text: #8b3a4a;
    --radius: 12px; --radius-sm: 8px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --font-fa: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141418; --bg2: #1e1e24; --bg3: #1e1820;
      --text: #f0f0f5; --text2: #a0a0b0; --text3: #606070;
      --border: #2a2a34; --border2: #38384a;
      --accent-light: #2a1f30; --accent-text: #d0b0e8;
      --rose-light: #2a1520; --rose-text: #f0a0b0;
    }
  }

  html { font-size: 16px; scroll-behavior: smooth; }
  body { font-family: var(--font-fa); background: var(--bg); color: var(--text); line-height: 1.7; direction: rtl; }
  body.ltr { font-family: var(--font); direction: ltr; text-align: left; }
  .container { max-width: 760px; margin: 0 auto; padding: 0 1.5rem 5rem; }

  /* Nav */
  .nav { padding: 1.25rem 0; margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .nav-back { font-size: 13px; color: var(--text2); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color .18s; }
  .nav-back:hover { color: var(--text); }
  .ltr .nav-back { flex-direction: row-reverse; }
  .lang-toggle { display: flex; gap: 8px; }
  .lang-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border2); background: transparent; cursor: pointer; font-size: 12px; color: var(--text2); font-family: inherit; transition: all .18s; }
  .lang-btn.active { background: var(--bg2); color: var(--text); font-weight: 500; }

  /* Hero */
  .hero { margin-bottom: 2.5rem; }
  .hero-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .tag { font-size: 12px; padding: 3px 12px; border-radius: 20px; font-weight: 500; }
  .tag-purple { background: var(--accent-light); color: var(--accent-text); }
  .tag-rose   { background: var(--rose-light);   color: var(--rose-text); }
  .hero-title { font-size: 32px; font-weight: 600; line-height: 1.25; margin-bottom: .75rem; }
  .hero-subtitle { font-size: 16px; color: var(--text2); max-width: 600px; line-height: 1.75; margin-bottom: 2rem; }

  /* Meta */
  .meta-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 3rem; }
  .meta-item { background: var(--bg2); padding: .9rem 1.25rem; }
  .meta-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: .3rem; }
  .meta-value { font-size: 14px; font-weight: 500; color: var(--text); }

  /* Cover */
  .cover { border-radius: var(--radius); overflow: hidden; margin-bottom: 3rem; background: #b8a0bf; display: flex; justify-content: center; }
  .cover img { width: 100%; max-height: 420px; object-fit: cover; object-position: top; display: block; }

  /* Divider & sections */
  .divider { height: 1px; background: var(--border); margin: 2.5rem 0; }
  .section { margin-bottom: 3rem; }
  .section-num { font-size: 11px; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: .5rem; }
  .section-title { font-size: 22px; font-weight: 600; margin-bottom: 1rem; line-height: 1.3; }
  .section-body { font-size: 15px; color: var(--text2); line-height: 1.8; }
  .section-body p { margin-bottom: 1rem; }
  .section-body p:last-child { margin-bottom: 0; }

  /* Callout */
  .callout { background: var(--accent-light); border-right: 3px solid var(--accent); border-radius: var(--radius-sm); padding: 1rem 1.25rem; margin: 1.5rem 0; font-size: 15px; color: var(--accent-text); line-height: 1.7; font-style: italic; }
  .ltr .callout { border-right: none; border-left: 3px solid var(--accent); }

  /* Pain points */
  .pain-list { display: flex; flex-direction: column; gap: 10px; margin: 1.5rem 0; }
  .pain-item { background: var(--rose-light); border: 1px solid #f0c0cc; border-radius: var(--radius-sm); padding: .9rem 1.25rem; font-size: 14px; color: var(--rose-text); line-height: 1.65; }
  .pain-item strong { display: block; margin-bottom: .25rem; font-size: 13px; }

  /* Feature list */
  .features { display: flex; flex-direction: column; gap: 12px; margin: 1.5rem 0; }
  .feature-item { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem 1.25rem; }
  .feature-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: .3rem; }
  .feature-desc { font-size: 14px; color: var(--text2); line-height: 1.65; }

  /* Principles grid */
  .principles { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin: 1.5rem 0; }
  .principle-card { background: var(--accent-light); border-radius: var(--radius-sm); padding: 1.1rem 1.25rem; }
  .principle-num { font-size: 22px; margin-bottom: .4rem; }
  .principle-title { font-size: 14px; font-weight: 600; color: var(--accent-text); margin-bottom: .3rem; }
  .principle-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }

  /* Screenshots */
  .screen-wrap { display: flex; justify-content: center; gap: 16px; margin: 2rem 0; flex-wrap: wrap; }
  .screen-img { width: 260px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,.12); display: block; border: 1px solid var(--border); }

  /* Nav bottom */
  .nav-bottom { margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
  .nav-bottom a { font-size: 14px; color: var(--text2); text-decoration: none; display: flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px solid var(--border2); border-radius: var(--radius-sm); transition: all .18s; }
  .nav-bottom a:hover { background: var(--bg2); color: var(--text); }

  @media (max-width: 480px) {
    .hero-title { font-size: 24px; }
    .screen-img { width: 100%; max-width: 300px; }
    .principles { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <nav class="nav">

    tags:[

    subtitle:'A family care management system for the elderly — bridging the gap between seniors, families, and caregivers.',

      {
        num:'01', title:'Project Overview',
        body:`<p>Designing for elderly users is not just about making the font bigger — it's designing for someone who may be interacting with a digital system for the very first time.</p><p>The goal of this project was to build a safe communication bridge between seniors, their families, and caregivers — turning medication and health management from a hidden source of anxiety into a transparent, stress-free experience for the whole family.</p>`,

function renderSection(s, lang) {
  const isRTL = lang === 'fa';
  let html = `<div class="section">
    <div class="section-num">${s.num}</div>
    <div class="section-title">${s.title}</div>
    <div class="section-body">${s.body}</div>`;

  if (s.pains) {
    html += `<div class="pain-list">` + s.pains.map(p =>
      `<div class="pain-item"><strong>${p.icon} ${p.title}</strong>${p.desc}</div>`
    ).join('') + `</div>`;
  }

  if (s.callout) html += `<div class="callout">${s.callout}</div>`;

  if (s.quotes) {
    html += `<div class="features">` + s.quotes.map(q =>
      `<div class="feature-item">
        <div class="feature-desc" style="font-style:italic;margin-bottom:.5rem">${q.text}</div>
        <div class="feature-title" style="color:var(--accent-text)">← ${q.result}</div>
      </div>`
    ).join('') + `</div>`;
  }

  if (s.principlesTitle) {
    html += `<div class="section-label" style="font-size:13px;font-weight:600;color:var(--text);margin:1.5rem 0 .75rem">${s.principlesTitle}</div>`;
  }

  if (s.principles) {
    html += `<div class="principles">` + s.principles.map(p =>
      `<div class="principle-card">
        <div class="principle-num">${p.num}</div>
        <div class="principle-title">${p.title}</div>
        <div class="principle-desc">${p.desc}</div>
      </div>`
    ).join('') + `</div>`;
  }

  if (s.features) {
    html += `<div class="features">` + s.features.map(f =>
      `<div class="feature-item">
        <div class="feature-title">${f.title}</div>
        <div class="feature-desc">${f.desc}</div>
      </div>`
    ).join('') + `</div>`;
  }

  if (s.imgs && s.imgs.length) {
    html += `<div class="screen-wrap">` +
      s.imgs.map(img => `<img class="screen-img" src="${IMG}${img}" alt="${s.title}" loading="lazy">`).join('') +
      `</div>`;
  }

  html += `</div><div class="divider"></div>`;
  return html;
}

function setLang(lang) {
  const d = c[lang];
  document.documentElement.lang = lang;
  document.documentElement.dir = d.dir;
  document.body.className = d.cls;
  document.querySelector('#navBack').textContent = d.navBack;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (lang==='fa'?'فارسی':'English'));
  });

  const tagHtml = d.tags.map(t=>`<span class="tag ${t.cls}">${t.text}</span>`).join('');
  const metaHtml = d.meta.map(m=>`<div class="meta-item"><div class="meta-label">${m.label}</div><div class="meta-value">${m.value}</div></div>`).join('');
  const sectionsHtml = d.sections.map(s => renderSection(s, lang)).join('');

  document.getElementById('content').innerHTML = `
    <div class="hero">
      <div class="hero-tags">${tagHtml}</div>
      <div class="hero-title">${d.title}</div>
      <div class="hero-subtitle">${d.subtitle}</div>
    </div>
    <div class="meta-row">${metaHtml}</div>
    <div class="cover"><img src="${IMG}01-splash.png" alt="Moragheb splash screen"></div>
